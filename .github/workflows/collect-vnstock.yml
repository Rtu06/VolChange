name: VNStock Daily Collector

on:
  schedule:
    # 17:00 VN = 10:00 UTC
    - cron: '0 10 * * 1-5'

  workflow_dispatch:

jobs:
  collect-vn:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install vnstock_data (CLI non-interactive)
        env:
          VNSTOCK_API_KEY: ${{ secrets.VNSTOCK_API_KEY }}
        run: |
          python -m pip install --upgrade pip

          # Tải CLI installer (dành cho server/CI — không có GUI)
          wget -q https://vnstocks.com/files/vnstock-cli-installer.run -O installer.run
          chmod +x installer.run

          # Cài không cần tương tác, truyền API key qua arg
          ./installer.run -- --non-interactive --api-key "$VNSTOCK_API_KEY"

          # Cài thêm các thư viện phụ trợ vào venv vừa tạo
          ~/.venv/bin/pip install pandas supabase

      - name: Run VNStock collector
        env:
          VNSTOCK_API_KEY:      ${{ secrets.VNSTOCK_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # Chạy script bằng Python từ venv đã cài vnstock_data
          ~/.venv/bin/python scripts/collect-vnstock.py
