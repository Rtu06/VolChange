name: VNStock Daily Collector

on:
  schedule:
    # 17:00 VN = 10:00 UTC
    - cron: '0 10 * * 1-5'

  workflow_dispatch:

jobs:
  collect-vn:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          
          # 1. Cài đặt công cụ phân phối package
          pip install --extra-index-url https://vnstocks.com/api/simple vnstock_installer
          
          # 2. Thực hiện cài đặt gói dữ liệu thông qua API Key
          python -m vnstock_installer --api-key "${{ secrets.VNSTOCK_API_KEY }}" --packages "vnstock_data"
          
          # 3. Cài các thư viện bổ sung còn lại của bạn
          pip install pandas supabase

      - name: Run VNStock collector
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/collect-vnstock.py