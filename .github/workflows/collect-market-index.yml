name: VNStock Market Index Collector

on:
  schedule:
    # 17:30 VN = 10:30 UTC — chạy sau collect-vnstock.yml 30 phút
    - cron: '30 5 * * 2-6'

  workflow_dispatch:

jobs:
  collect-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase

      - name: Run market index collector
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/collect-market-index.py