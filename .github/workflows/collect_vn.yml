name: VN Stock Daily Collector

on:
  schedule:
    # Chạy lúc 16:15 giờ VN (UTC+7) = 09:15 UTC, T2–T6
    - cron: '15 9 * * 1-5'
  workflow_dispatch:  # Cho phép chạy thủ công

jobs:
  collect:
    name: Collect VN Stock Daily Data
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run VN stock collector
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/collect_vn.js
