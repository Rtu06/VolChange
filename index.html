<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Binance Volume Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ── CSS Variables ─────────────────────────────────────── */
  :root {
    --bg:         #080b0f;
    --surface:    #0e1318;
    --border:     #1a2330;
    --border2:    #243040;
    --text:       #c8d8e8;
    --muted:      #4a6070;
    --accent:     #00d4aa;
    --accent-dim: #00d4aa22;
    --green:      #00e676;
    --green-dim:  #00e67618;
    --red:        #ff4757;
    --red-dim:    #ff475718;
    --yellow:     #ffd32a;
    --mono:       'Space Mono', monospace;
    --sans:       'Inter', sans-serif;
    --col-h: 42px;
  }

  /* ── Reset ──────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 13px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Scanline texture overlay ───────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Header ─────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
    gap: 12px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--accent); }
    50%       { opacity: 0.6; box-shadow: 0 0 0 4px transparent; }
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .stat-chip {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    display: flex; align-items: center; gap: 5px;
  }
  .stat-chip span { color: var(--text); }

  .refresh-btn {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 3px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .refresh-btn:hover { background: var(--accent); color: #000; }
  .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Controls bar ───────────────────────────────────────── */
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 280px;
    min-width: 160px;
  }
  .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 13px; pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 7px 10px 7px 30px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--accent); }

  .sort-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .sort-select {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 7px 10px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    cursor: pointer;
  }
  .sort-select:focus { border-color: var(--accent); }

  .count-badge {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
    white-space: nowrap;
  }
  .count-badge b { color: var(--accent); }

  /* ── Table container ────────────────────────────────────── */
  .table-wrap {
    overflow-x: auto;
    padding: 0 0 60px;
  }

  table {
    width: 100%;
    min-width: 900px;
    border-collapse: collapse;
  }

  /* ── Table head ─────────────────────────────────────────── */
  thead tr {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
  }

  th {
    padding: 0 12px;
    height: var(--col-h);
    text-align: right;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
    user-select: none;
    cursor: pointer;
    position: relative;
    transition: color 0.15s;
  }
  th:first-child { text-align: left; padding-left: 24px; }
  th:hover { color: var(--text); }
  th.active { color: var(--accent); }
  th .sort-arrow {
    display: inline-block;
    margin-left: 4px;
    transition: transform 0.2s;
    opacity: 0.5;
  }
  th.active .sort-arrow { opacity: 1; }

  /* group separator */
  th.group-sep { border-left: 1px solid var(--border2); }

  /* ── Table body ─────────────────────────────────────────── */
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:hover { background: rgba(0,212,170,0.03); }

  td {
    padding: 0 12px;
    height: 38px;
    text-align: right;
    font-family: var(--mono);
    font-size: 12px;
    white-space: nowrap;
    vertical-align: middle;
  }
  td:first-child { text-align: left; padding-left: 24px; }
  td.group-sep { border-left: 1px solid var(--border); }

  .symbol-cell {
    display: flex; align-items: center; gap: 8px;
  }
  .symbol-name {
    font-weight: 700;
    font-size: 12.5px;
    color: #e8f0f8;
  }
  .symbol-base {
    font-size: 10px;
    color: var(--muted);
    background: var(--border);
    padding: 1px 4px;
    border-radius: 2px;
  }

  .price-cell { color: var(--text); }

  .vol-cell { color: #8090a8; }
  .vol-cell .unit { color: var(--muted); font-size: 10px; }

  .pct-cell {
    font-weight: 700;
    font-size: 12px;
  }
  .pct-cell.pos {
    color: var(--green);
    background: var(--green-dim);
    border-radius: 3px;
    padding: 2px 6px;
  }
  .pct-cell.neg {
    color: var(--red);
    background: var(--red-dim);
    border-radius: 3px;
    padding: 2px 6px;
  }
  .pct-cell.neu { color: var(--muted); }
  .pct-cell.na  { color: var(--muted); font-size: 10px; font-weight: 400; }

  /* ── Loading / Error / Empty states ────────────────────── */
  .state-overlay {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    gap: 12px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-icon { font-size: 28px; }

  /* ── Auto-refresh countdown ─────────────────────────────── */
  #countdown { font-variant-numeric: tabular-nums; }

  /* ── Scrollbar ──────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    BINANCE VOL TRACKER
  </div>
  <div class="header-meta">
    <div class="stat-chip">PAIRS <span id="total-pairs">—</span></div>
    <div class="stat-chip">UPDATED <span id="last-update">—</span></div>
    <div class="stat-chip">REFRESH <span id="countdown">—</span></div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadData()">⟳ REFRESH</button>
  </div>
</header>

<!-- ── Controls ─────────────────────────────────────────────── -->
<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input class="search-input" id="search" type="text" placeholder="Search symbol... e.g. BTC" />
  </div>
  <span class="sort-label">SORT BY</span>
  <select class="sort-select" id="quick-sort" onchange="applyQuickSort(this.value)">
    <option value="%1h_desc">%1H ↓ (Top Gainers)</option>
    <option value="%1h_asc">%1H ↑ (Top Losers)</option>
    <option value="%4h_desc">%4H ↓</option>
    <option value="%4h_asc">%4H ↑</option>
    <option value="%1d_desc">%1D ↓</option>
    <option value="%1d_asc">%1D ↑</option>
    <option value="vol1h_desc">Vol 1H ↓</option>
    <option value="vol1d_desc">Vol 1D ↓</option>
  </select>
  <span class="count-badge">Showing <b id="showing-count">0</b> pairs</span>
</div>

<!-- ── Table ────────────────────────────────────────────────── -->
<div class="table-wrap">
  <div id="state-container" class="state-overlay">
    <div class="spinner"></div>
    <span>Connecting to Supabase...</span>
  </div>
  <table id="main-table" style="display:none">
    <thead>
      <tr>
        <th onclick="sortBy('symbol')" data-col="symbol">SYMBOL <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('price')" data-col="price">PRICE <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('vol1h')" data-col="vol1h" class="group-sep">VOL 1H <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('pct1h')" data-col="pct1h" class="active">%1H <span class="sort-arrow">↓</span></th>
        <th onclick="sortBy('vol4h')" data-col="vol4h" class="group-sep">VOL 4H <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('pct4h')" data-col="pct4h">%4H <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('vol1d')" data-col="vol1d" class="group-sep">VOL 1D <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('pct1d')" data-col="pct1d">%1D <span class="sort-arrow">↕</span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- ── Scripts ──────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ══════════════════════════════════════════════════════════════
// CONFIG — thay bằng credentials của bạn
// ══════════════════════════════════════════════════════════════
const SUPABASE_URL  = 'YOUR_SUPABASE_URL';   // ví dụ: https://xxxx.supabase.co
const SUPABASE_ANON = 'YOUR_SUPABASE_ANON_KEY';

// ── State ──────────────────────────────────────────────────────
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let allRows      = [];   // dữ liệu đã tính toán
let sortCol      = 'pct1h';
let sortDir      = 'desc';
let searchTerm   = '';
let countdownVal = 300;  // 5 phút
let countdownTimer;

// ══════════════════════════════════════════════════════════════
// DATA FETCHING
// ══════════════════════════════════════════════════════════════

async function loadData() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  showState('loading', 'Fetching data...');
  resetCountdown();

  try {
    // Lấy 48 giờ gần nhất để tính được %4H và %1D
    const since = new Date(Date.now() - 48 * 60 * 60 * 1000).toISOString();

    const { data, error } = await sb
      .from('market_data')
      .select('symbol, price, volume, quote_volume, created_at')
      .gte('created_at', since)
      .order('created_at', { ascending: false });

    if (error) throw error;
    if (!data || data.length === 0) {
      showState('empty', 'No data found. Collector may not have run yet.');
      return;
    }

    allRows = computeRows(data);
    document.getElementById('total-pairs').textContent = allRows.length;
    document.getElementById('last-update').textContent = formatTime(new Date());
    renderTable();

  } catch (err) {
    console.error(err);
    showState('error', `Error: ${err.message}`);
  } finally {
    btn.disabled = false;
  }
}

// ══════════════════════════════════════════════════════════════
// COMPUTATION
// ══════════════════════════════════════════════════════════════

/**
 * data: array of {symbol, price, quote_volume, created_at}
 * grouped by symbol, sorted newest first
 *
 * Ký hiệu: t=0 (newest), t=1 (1h ago), ...
 * %1H  = (t0 - t1) / t1 * 100
 * vol4H_curr = t0+t1+t2+t3
 * vol4H_prev = t4+t5+t6+t7
 * %4H  = (curr4 - prev4) / prev4 * 100
 * vol1D_curr = t0..t23
 * vol1D_prev = t24..t47
 * %1D  = (curr1d - prev1d) / prev1d * 100
 */
function computeRows(data) {
  // Group by symbol
  const bySymbol = {};
  for (const row of data) {
    if (!bySymbol[row.symbol]) bySymbol[row.symbol] = [];
    bySymbol[row.symbol].push(row);
  }

  const results = [];

  for (const [symbol, rows] of Object.entries(bySymbol)) {
    // rows đã sort DESC (newest first từ query)
    const qv = rows.map(r => r.quote_volume);
    const n  = qv.length;

    const t = (i) => (i < n ? qv[i] : null);
    const sumRange = (from, to) => {  // inclusive
      let s = 0, valid = 0;
      for (let i = from; i <= to; i++) {
        if (t(i) !== null) { s += t(i); valid++; }
      }
      return valid > 0 ? s : null;
    };
    const pct = (curr, prev) =>
      (curr !== null && prev !== null && prev !== 0)
        ? (curr - prev) / prev * 100
        : null;

    const vol1h = t(0);
    const pct1h = pct(t(0), t(1));

    const vol4h_curr = sumRange(0, 3);
    const vol4h_prev = sumRange(4, 7);
    const pct4h      = pct(vol4h_curr, vol4h_prev);

    const vol1d_curr = sumRange(0, 23);
    const vol1d_prev = sumRange(24, 47);
    const pct1d      = pct(vol1d_curr, vol1d_prev);

    results.push({
      symbol,
      price:    rows[0].price,
      vol1h,
      pct1h,
      vol4h:    vol4h_curr,
      pct4h,
      vol1d:    vol1d_curr,
      pct1d,
      _hours:   n,
    });
  }

  return results;
}

// ══════════════════════════════════════════════════════════════
// RENDERING
// ══════════════════════════════════════════════════════════════

function renderTable() {
  const q   = searchTerm.toUpperCase();
  let rows  = q
    ? allRows.filter(r => r.symbol.includes(q))
    : [...allRows];

  // Sort
  rows.sort((a, b) => {
    const av = a[sortCol];
    const bv = b[sortCol];
    if (av === null && bv === null) return 0;
    if (av === null) return 1;
    if (bv === null) return -1;
    if (typeof av === 'string') return sortDir === 'asc'
      ? av.localeCompare(bv) : bv.localeCompare(av);
    return sortDir === 'asc' ? av - bv : bv - av;
  });

  document.getElementById('showing-count').textContent = rows.length;

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = rows.map(renderRow).join('');

  hideState();
}

function renderRow(r) {
  const base = r.symbol.replace('USDT', '');
  return `<tr>
    <td>
      <div class="symbol-cell">
        <span class="symbol-name">${base}</span>
        <span class="symbol-base">USDT</span>
      </div>
    </td>
    <td class="price-cell">${formatPrice(r.price)}</td>
    <td class="vol-cell group-sep">${formatVol(r.vol1h)}</td>
    <td>${pctCell(r.pct1h)}</td>
    <td class="vol-cell group-sep">${formatVol(r.vol4h)}</td>
    <td>${pctCell(r.pct4h)}</td>
    <td class="vol-cell group-sep">${formatVol(r.vol1d)}</td>
    <td>${pctCell(r.pct1d)}</td>
  </tr>`;
}

// ══════════════════════════════════════════════════════════════
// FORMATTERS
// ══════════════════════════════════════════════════════════════

function formatPrice(p) {
  if (p === null) return '<span class="na">—</span>';
  if (p >= 1000)  return p.toLocaleString('en-US', { maximumFractionDigits: 2 });
  if (p >= 1)     return p.toFixed(4);
  if (p >= 0.001) return p.toFixed(6);
  return p.toExponential(4);
}

function formatVol(v) {
  if (v === null) return '<span class="na">—</span>';
  if (v >= 1e9) return `${(v/1e9).toFixed(2)}<span class="unit">B</span>`;
  if (v >= 1e6) return `${(v/1e6).toFixed(2)}<span class="unit">M</span>`;
  if (v >= 1e3) return `${(v/1e3).toFixed(1)}<span class="unit">K</span>`;
  return v.toFixed(0);
}

function pctCell(v) {
  if (v === null) return '<span class="pct-cell na">N/A</span>';
  const cls = v > 0 ? 'pos' : v < 0 ? 'neg' : 'neu';
  const sign = v > 0 ? '+' : '';
  return `<span class="pct-cell ${cls}">${sign}${v.toFixed(2)}%</span>`;
}

function formatTime(d) {
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

// ══════════════════════════════════════════════════════════════
// SORT & FILTER
// ══════════════════════════════════════════════════════════════

function sortBy(col) {
  if (sortCol === col) {
    sortDir = sortDir === 'desc' ? 'asc' : 'desc';
  } else {
    sortCol = col;
    sortDir = 'desc';
  }
  updateSortHeaders();
  if (allRows.length) renderTable();
}

function updateSortHeaders() {
  document.querySelectorAll('th[data-col]').forEach(th => {
    const col = th.dataset.col;
    const arrow = th.querySelector('.sort-arrow');
    if (col === sortCol) {
      th.classList.add('active');
      arrow.textContent = sortDir === 'desc' ? '↓' : '↑';
    } else {
      th.classList.remove('active');
      arrow.textContent = '↕';
    }
  });
}

function applyQuickSort(val) {
  const [col, dir] = val.split('_');
  const map = {
    '%1h': 'pct1h', '%4h': 'pct4h', '%1d': 'pct1d',
    'vol1h': 'vol1h', 'vol1d': 'vol1d',
  };
  sortCol = map[col] || col;
  sortDir = dir;
  updateSortHeaders();
  if (allRows.length) renderTable();
}

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value;
  if (allRows.length) renderTable();
});

// ══════════════════════════════════════════════════════════════
// UI STATE
// ══════════════════════════════════════════════════════════════

function showState(type, msg) {
  const el = document.getElementById('state-container');
  document.getElementById('main-table').style.display = 'none';
  el.style.display = 'flex';

  if (type === 'loading') {
    el.innerHTML = `<div class="spinner"></div><span>${msg}</span>`;
  } else if (type === 'error') {
    el.innerHTML = `<span class="error-icon">⚠</span><span style="color:var(--red)">${msg}</span>`;
  } else {
    el.innerHTML = `<span class="error-icon">○</span><span>${msg}</span>`;
  }
}

function hideState() {
  document.getElementById('state-container').style.display = 'none';
  document.getElementById('main-table').style.display = 'table';
}

// ══════════════════════════════════════════════════════════════
// AUTO REFRESH COUNTDOWN (5 min)
// ══════════════════════════════════════════════════════════════

function resetCountdown() {
  clearInterval(countdownTimer);
  countdownVal = 300;
  countdownTimer = setInterval(() => {
    countdownVal--;
    const m = Math.floor(countdownVal / 60);
    const s = String(countdownVal % 60).padStart(2, '0');
    document.getElementById('countdown').textContent = `${m}:${s}`;
    if (countdownVal <= 0) loadData();
  }, 1000);
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
loadData();
</script>
</body>
</html>
