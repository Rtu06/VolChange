<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Binance Daily Volume Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    BINANCE VOLUME TRACKER
  </div>
  <div class="header-meta">
    <div class="stat-chip">PAIRS <span id="total-pairs">—</span></div>
    <div class="stat-chip">DATE <span id="data-date">—</span></div>
    <div class="stat-chip">LOADED <span id="last-update">—</span></div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadData()">⟳ REFRESH</button>
  </div>
</header>

<!-- ── Controls ─────────────────────────────────────────────── -->
<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input class="search-input" id="search" type="text" placeholder="Search symbol... e.g. BTC" />
  </div>
  <span class="sort-label">SORT BY</span>
  <select class="sort-select" id="quick-sort" onchange="applyQuickSort(this.value)">
    <option value="vol1d_desc">Vol 1D ↓ (Highest Volume)</option>
    <option value="vol1d_asc">Vol 1D ↑ (Lowest Volume)</option>
    <option value="pctVol1d_desc">%Vol 1D ↓ (Volume Surge)</option>
    <option value="pctVol1d_asc">%Vol 1D ↑ (Volume Drop)</option>
    <option value="pctPrice1d_desc">%Price ↓ (Top Gainers)</option>
    <option value="pctPrice1d_asc">%Price ↑ (Top Losers)</option>
    <option value="vol7d_desc">Vol 7D ↓</option>
    <option value="pctVol7d_desc">%Vol 7D ↓</option>
  </select>

  <!-- ★ FAVORITES FILTER BUTTON -->
  <button
    class="fav-only-btn"
    id="fav-only-btn"
    onclick="toggleFavOnly()"
    disabled
    title="No favorites yet"
  >
    <span class="fav-btn-star">★</span>
    WATCHLIST
    <span class="fav-count-pill"><span id="fav-count">0</span></span>
  </button>

  <span class="count-badge">Showing <b id="showing-count">0</b> pairs</span>
</div>

<!-- ── Table ────────────────────────────────────────────────── -->
<div class="table-wrap">
  <div id="state-container" class="state-overlay">
    <div class="spinner"></div>
    <span>Connecting to Supabase...</span>
  </div>
  <table id="main-table" style="display:none">
    <thead>
      <tr>
        <th class="star-col" title="Favorites">★</th>
        <th onclick="sortBy('symbol')"      data-col="symbol"    >#  SYMBOL <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('price')"       data-col="price"     >PRICE <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('vol1h')"       data-col="vol1h" class="group-sep">VOL 1H <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('pct1h')"       data-col="pct1h"     >%VOL 1H <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('vol4h')"       data-col="vol4h" class="group-sep">VOL 4H <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('pct4h')"       data-col="pct4h"     >%VOL 4H <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('vol1d')"       data-col="vol1d" class="group-sep">VOL 1D <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('pct1d')"       data-col="pct1d"     >%VOL 1D <span class="sort-arrow">↕</span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- ── Scripts ──────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="script.js"></script>
</body>
</html>
