<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Binance Volume Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    BINANCE VOL TRACKER
  </div>
  <div class="header-meta">
    <div class="stat-chip">PAIRS <span id="total-pairs">—</span></div>
    <div class="stat-chip">UPDATED <span id="last-update">—</span></div>
    <div class="stat-chip">REFRESH <span id="countdown">—</span></div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadData()">⟳ REFRESH</button>
  </div>
</header>

<!-- ── Controls ─────────────────────────────────────────────── -->
<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input class="search-input" id="search" type="text" placeholder="Search symbol... e.g. BTC" />
  </div>
  <span class="sort-label">SORT BY</span>
  <select class="sort-select" id="quick-sort" onchange="applyQuickSort(this.value)">
    <option value="%1h_desc">%1H ↓ (Top Gainers)</option>
    <option value="%1h_asc">%1H ↑ (Top Losers)</option>
    <option value="%4h_desc">%4H ↓</option>
    <option value="%4h_asc">%4H ↑</option>
    <option value="%1d_desc">%1D ↓</option>
    <option value="%1d_asc">%1D ↑</option>
    <option value="vol1h_desc">Vol 1H ↓</option>
    <option value="vol1d_desc">Vol 1D ↓</option>
  </select>
  <span class="count-badge">Showing <b id="showing-count">0</b> pairs</span>
</div>

<!-- ── Table ────────────────────────────────────────────────── -->
<div class="table-wrap">
  <div id="state-container" class="state-overlay">
    <div class="spinner"></div>
    <span>Connecting to Supabase...</span>
  </div>
  <table id="main-table" style="display:none">
    <thead>
      <tr>
        <th onclick="sortBy('symbol')" data-col="symbol">SYMBOL <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('price')" data-col="price">PRICE <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('vol1h')" data-col="vol1h" class="group-sep">VOL 1H <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('pct1h')" data-col="pct1h" class="active">%1H <span class="sort-arrow">↓</span></th>
        <th onclick="sortBy('vol4h')" data-col="vol4h" class="group-sep">VOL 4H <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('pct4h')" data-col="pct4h">%4H <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('vol1d')" data-col="vol1d" class="group-sep">VOL 1D <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('pct1d')" data-col="pct1d">%1D <span class="sort-arrow">↕</span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- ── Scripts ──────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="script.js"></script>
</body>
</html>
