<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Binance Daily Volume Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    BINANCE VOLUME TRACKER
    <div class="tooltip-container">
      <div class="question-circle">?</div>
      <div class="tooltip-box">
        Track changes in trading volume to determine which token is receiving capital inflows.
      </div>
    </div>
  </div>  
  
  <div class="header-meta">
    <div class="stat-chip">PAIRS <span id="total-pairs">—</span></div>
    <div class="stat-chip">DATE <span id="data-date">—</span></div>
    <div class="stat-chip">LOADED <span id="last-update">—</span></div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadData()">⟳ REFRESH</button>
  </div>
</header>

<!-- ── Controls ─────────────────────────────────────────────── -->
<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input class="search-input" id="search" type="text" placeholder="Search symbol... e.g. BTC" />
  </div>
  <!-- ── Favorite filter button ── -->
  <button class="fav-filter-btn" id="fav-filter-btn" onclick="toggleFavFilter()">
    ★ WATCHLIST <span id="fav-count"></span>
  </button>
  <span class="count-badge">Showing <b id="showing-count">0</b> pairs</span>
</div>

<!-- ── Table ────────────────────────────────────────────────── -->
<div class="table-wrap">
  <div id="state-container" class="state-overlay">
    <div class="spinner"></div>
    <span>Connecting to Supabase...</span>
  </div>
  <table id="main-table" style="display:none">
    <thead>
      <tr>
        <th onclick="sortBy('symbol')"       data-col="symbol"      >#  SYMBOL <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('price')"        data-col="price"       >PRICE <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('pctPrice1d')"   data-col="pctPrice1d"  >%PRICE 1D <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('vol1d')"        data-col="vol1d"  class="group-sep">VOL 1D <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('pctVol1d')"     data-col="pctVol1d"    >%VOL 1D <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('vol3d')"        data-col="vol3d"  class="group-sep">VOL 3D <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('pctVol3d')"     data-col="pctVol3d"    >%VOL 3D <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('vol7d')"        data-col="vol7d"  class="group-sep">VOL 7D <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('pctVol7d')"     data-col="pctVol7d"    >%VOL 7D <span class="sort-arrow">↕</span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- ── Pagination ───────────────────────────────────────────── -->
<div id="pagination" class="pagination"></div>

<!-- ── Scripts ──────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="script.js"></script>
</body>
</html>
