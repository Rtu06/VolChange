name: Binance Volume Collector

on:
  # Chạy mỗi giờ đúng (UTC) — GitHub Actions free tier hỗ trợ cron này
  schedule:
    - cron: '0 * * * *'

  # Cho phép trigger thủ công từ GitHub UI để test
  workflow_dispatch:

jobs:
  collect:
    name: Collect Binance Volume
    runs-on: ubuntu-latest
    timeout-minutes: 5  # Kill nếu quá 5 phút (fail-safe)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run collector
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/collect.js
